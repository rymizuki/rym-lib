name: test
on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v7
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: npm ci

      - run: npm run build
      - run: npm run lint
      - run: npm run format
      - run: npm test
